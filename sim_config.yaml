job:
  name: two_cubes_x_1mm_regions
  output: two_cubes_x_1mm_regions.inp

mesh:
  input: two_cubes_x_1mm_regions.mesh

materials:
  - name: Bulk
    density: 1.30e-9
    elastic:
      E: 10000.0
      nu: 0.4
    plastic:
      yield_stress: 170.0

  - name: Interface
    cohesive:
      stiffness:
        knn: 100000.0
        kss: 100000.0
        ktt: 100000.0

      damage:
        normal_strength: 1.5
        shear_strength: 1.5
        fracture_energy: 0.01
        stabilization: 1.0e-4

sections:
  solid:
    elset: TETRA
    material: Bulk

  cohesive:
    elset: COHESIVE
    material: Interface
    response: TRACTION SEPARATION

loading:
  macro_stress:
    sxx: 100.0
    syy: 0.0
    szz: 0.0
    sxy: 0.0
    sxz: 0.0
    syz: 0.0

step:
  name: MacroStressLoading
  type: dynamic_implicit
  nlgeom: true
  increments:
    initial: 0.01
    total: 1.0
    minimum: 1.0e-12
    maximum: 0.1
    max_number: 100000
  controls:
    time_incrementation:
      enabled: true

      # Main iteration limits
      max_equilibrium_iterations: 30
      cutback_after_equilibrium_iterations: 20
      max_attempts_per_increment: 10

      # Optional severe discontinuity controls
      max_severe_discontinuity_iterations: 20
      severe_discontinuity_iterations_for_increase: 8

      # Optional increment scaling factors
      cutback_factor_after_divergence: 0.25
      cutback_factor_slow_convergence: 0.5
      cutback_factor_too_many_iterations: 0.75
      increase_factor_after_easy_increments: 1.5
      max_increment_increase_factor: 1.5