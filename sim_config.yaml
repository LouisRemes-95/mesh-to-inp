job:
  name: mmg_remesh_x4_S
  output: mmg_remesh_x4_S.inp

mesh:
  input: mmg_remesh_x4_S.mesh

materials:
  - name: Bulk
    density: 1.30e-9
    elastic:
      E: 10000.0
      nu: 0.4
    plastic:
      yield_stress: 170.0

  - name: Interface
    cohesive:
      stiffness:
        knn: 100000.0
        kss: 100000.0
        ktt: 100000.0

      damage:
        normal_strength: 30
        shear_strength: 30
        fracture_energy: 4
        stabilization: 1.0e-4

rigid_body_stabilization:
  stiffness: 1.0e-4

sections:
  solid:
    elset: TETRA
    material: Bulk

  cohesive:
    elset: COHESIVE
    material: Interface
    response: TRACTION SEPARATION

loading:
  macro_stress:
    sxx: 10.0
    syy: 0.0
    szz: 0.0
    sxy: 0.0
    sxz: 0.0
    syz: 0.0

step:
  name: MacroStressLoading
  type: dynamic_implicit
  nlgeom: true
  increments:
    initial: 0.01
    total: 1.0
    minimum: 1.0e-12
    maximum: 0.1
    max_number: 100000
  controls:
    analysis: discontinuous

    time_incrementation:
      enabled: true
      values: [null, null, null, 32, 20, 12, null, 20, 10, null, null]

    line_search:
      enabled: true
      values: [5, null, null, null, null]